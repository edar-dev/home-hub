workflows:
  ci_checks:
    name: CI Checks
    max_build_duration: 60
    # instance_type: ometti per usare il default del piano; linux_x2 richiede billing.
    environment:
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true
        - pattern: develop
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Check formatting
        script: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        script: flutter analyze
      # I benchmark in test/performance/ sono `*_benchmark.dart` (non `*_test.dart`) e non entrano in questa suite.
      - name: Tests
        script: flutter test test/

  android_play_internal:
    name: Android Play Internal
    max_build_duration: 60
    # instance_type: ometti per usare il default del piano; linux_x2 richiede billing.
    environment:
      flutter: stable
      # Obbligatorio con YAML: i secret devono stare in un gruppo con QUESTO nome in Codemagic
      # (App → Environment variables → crea gruppo `google_credentials` → variabili Secret).
      groups:
        - google_credentials
      vars:
        PACKAGE_NAME: "com.organizedhive.app"
    # Run manually from Codemagic UI, or automatically on tag v*
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: v*
          include: true
      cancel_previous_builds: false
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Check Play credentials
        script: |
          if [ -z "${PLAY_SERVICE_ACCOUNT_CREDENTIALS:-}" ]; then
            echo "PLAY_SERVICE_ACCOUNT_CREDENTIALS è vuota: il workflow non sta caricando il secret."
            echo "Con codemagic.yaml devi (1) creare il gruppo google_credentials in Codemagic,"
            echo "(2) aggiungervi il JSON del service account come variabile Secret con quel nome esatto,"
            echo "(3) avere groups: - google_credentials in questo workflow. Vedi docs/publish/play-store-publish-guide.md."
            exit 1
          fi
      - name: Configure Android signing
        script: |
          if [ -z "$CM_KEYSTORE" ]; then
            echo "Missing CM_KEYSTORE (base64 upload-keystore.jks)."
            exit 1
          fi
          if [ -z "$CM_KEYSTORE_PASSWORD" ] || [ -z "$CM_KEY_ALIAS" ] || [ -z "$CM_KEY_PASSWORD" ]; then
            echo "Missing signing secrets: CM_KEYSTORE_PASSWORD / CM_KEY_ALIAS / CM_KEY_PASSWORD."
            exit 1
          fi
          KS="$CM_BUILD_DIR/android/upload-keystore.jks"
          # Rimuove a capo/spazi nel Base64 (incolla da terminale o da mail spesso spezza le righe).
          CM_KEYSTORE_CLEAN=$(printf '%s' "$CM_KEYSTORE" | tr -d '\n\r\t ')
          decode_ok=false
          rm -f "$KS"
          if printf '%s' "$CM_KEYSTORE_CLEAN" | base64 --decode >"$KS" 2>/dev/null && [ -s "$KS" ]; then
            decode_ok=true
          fi
          if [ "$decode_ok" != true ]; then
            rm -f "$KS"
            if printf '%s' "$CM_KEYSTORE_CLEAN" | base64 -D >"$KS" 2>/dev/null && [ -s "$KS" ]; then
              decode_ok=true
            fi
          fi
          if [ "$decode_ok" != true ]; then
            rm -f "$KS"
            if printf '%s' "$CM_KEYSTORE_CLEAN" | openssl base64 -d -out "$KS" 2>/dev/null && [ -s "$KS" ]; then
              decode_ok=true
            fi
          fi
          if [ "$decode_ok" != true ]; then
            echo "Impossibile decodificare CM_KEYSTORE: deve essere Base64 standard del file .jks (stesso byte del file locale)."
            echo "In PowerShell usa: [Convert]::ToBase64String([IO.File]::ReadAllBytes('...\\upload-keystore.jks')) e incolla tutto senza virgolette."
            exit 1
          fi
          # Spazi/\r accidentali ai bordi delle password (copy-paste da UI).
          STORE_PASS=$(printf '%s' "$CM_KEYSTORE_PASSWORD" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/\r//g')
          KEY_PASS=$(printf '%s' "$CM_KEY_PASSWORD" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/\r//g')
          ALIAS=$(printf '%s' "$CM_KEY_ALIAS" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/\r//g')
          KT_ERR="$CM_BUILD_DIR/android/keytool-signing.err"
          KLIST="$CM_BUILD_DIR/android/keytool-list.out"
          if ! keytool -list -keystore "$KS" -storepass "$STORE_PASS" >"$KLIST" 2>"$KT_ERR"; then
            echo "keytool non apre il keystore. Messaggio keytool:"
            sed 's/^/  /' "$KT_ERR" || true
            echo "Se dice password errata: verifica CM_KEYSTORE_PASSWORD in Codemagic = storePassword in android/key.properties locale."
            echo "Se il file è corrotto: rigenera CM_KEYSTORE dal .jks locale e assicurati che Codemagic non tronchi il secret (limite lunghezza)."
            exit 1
          fi
          if ! keytool -list -keystore "$KS" -storepass "$STORE_PASS" -alias "$ALIAS" >/dev/null 2>"$KT_ERR"; then
            n_pk=$(grep 'PrivateKeyEntry' "$KLIST" | wc -l | tr -d '[:space:]')
            if [ "${n_pk:-0}" -eq 1 ]; then
              ALIAS=$(grep 'PrivateKeyEntry' "$KLIST" | head -1 | sed 's/^[[:space:]]*//;s/,.*//')
              echo "CM_KEY_ALIAS non coincide con il keystore; c'è una sola chiave: uso alias '$ALIAS' (imposta CM_KEY_ALIAS=$ALIAS in Codemagic per evitare questo messaggio)."
            else
              echo "Alias '$ALIAS' non trovato. CM_KEY_ALIAS deve essere esattamente il nome prima della virgola in keytool -list (es. upload). Elenco:"
              cat "$KLIST"
              exit 1
            fi
          fi
          {
            printf 'storePassword=%s\n' "$STORE_PASS"
            printf 'keyPassword=%s\n' "$KEY_PASS"
            printf 'keyAlias=%s\n' "$ALIAS"
            printf '%s\n' 'storeFile=upload-keystore.jks'
          } > "$CM_BUILD_DIR/android/key.properties"
      - name: Build AAB
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
    publishing:
      google_play:
        credentials: $PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        # Durante bootstrap Play può accettare solo release draft finché l'app resta "draft app".
        # Quando Play permette rollout non-draft, puoi riportarlo a false.
        submit_as_draft: true
