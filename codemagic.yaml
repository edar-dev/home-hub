workflows:
  ci_checks:
    name: CI Checks
    max_build_duration: 60
    # instance_type: ometti per usare il default del piano; linux_x2 richiede billing.
    environment:
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true
        - pattern: develop
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Check formatting
        script: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        script: flutter analyze
      # I benchmark in test/performance/ sono `*_benchmark.dart` (non `*_test.dart`) e non entrano in questa suite.
      - name: Tests
        script: flutter test test/

  android_play_internal:
    name: Android Play Internal
    max_build_duration: 60
    # instance_type: ometti per usare il default del piano; linux_x2 richiede billing.
    environment:
      flutter: stable
      # Obbligatorio con YAML: i secret devono stare in un gruppo con QUESTO nome in Codemagic
      # (App → Environment variables → crea gruppo `google_credentials` → variabili Secret).
      groups:
        - google_credentials
      vars:
        PACKAGE_NAME: "com.organizedhive.app"
    # Run manually from Codemagic UI, or automatically on tag v*
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: v*
          include: true
      cancel_previous_builds: false
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Check Play credentials
        script: |
          if [ -z "${PLAY_SERVICE_ACCOUNT_CREDENTIALS:-}" ]; then
            echo "PLAY_SERVICE_ACCOUNT_CREDENTIALS è vuota: il workflow non sta caricando il secret."
            echo "Con codemagic.yaml devi (1) creare il gruppo google_credentials in Codemagic,"
            echo "(2) aggiungervi il JSON del service account come variabile Secret con quel nome esatto,"
            echo "(3) avere groups: - google_credentials in questo workflow. Vedi docs/publish/play-store-publish-guide.md."
            exit 1
          fi
      - name: Configure Android signing
        script: |
          if [ -z "$CM_KEYSTORE" ]; then
            echo "Missing CM_KEYSTORE (base64 upload-keystore.jks)."
            exit 1
          fi
          if [ -z "$CM_KEYSTORE_PASSWORD" ] || [ -z "$CM_KEY_ALIAS" ] || [ -z "$CM_KEY_PASSWORD" ]; then
            echo "Missing signing secrets: CM_KEYSTORE_PASSWORD / CM_KEY_ALIAS / CM_KEY_PASSWORD."
            exit 1
          fi
          # printf evita che echo interpreti "-" iniziale; niente espansione accidentale nel base64.
          printf '%s' "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/android/upload-keystore.jks"
          KS="$CM_BUILD_DIR/android/upload-keystore.jks"
          if [ ! -s "$KS" ]; then
            echo "upload-keystore.jks è vuoto: CM_KEYSTORE non è Base64 valido del .jks o è troncato."
            exit 1
          fi
          # printf '%s' evita che $ o ! nelle password rompano key.properties (echo le espanderebbe).
          ALIAS=$(printf '%s' "$CM_KEY_ALIAS" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/\r//g')
          {
            printf 'storePassword=%s\n' "$CM_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$CM_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ALIAS"
            printf '%s\n' 'storeFile=upload-keystore.jks'
          } > "$CM_BUILD_DIR/android/key.properties"
          if ! keytool -list -keystore "$KS" -storepass "$CM_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "keytool: impossibile aprire il keystore. Controlla CM_KEYSTORE (Base64 su UNA riga, stesso .jks di upload) e CM_KEYSTORE_PASSWORD."
            exit 1
          fi
          if ! keytool -list -keystore "$KS" -storepass "$CM_KEYSTORE_PASSWORD" -alias "$ALIAS" >/dev/null 2>&1; then
            echo "Alias '$ALIAS' non trovato nel keystore. CM_KEY_ALIAS deve coincidere con 'Alias name' da keytool -list. Entry nel keystore:"
            keytool -list -keystore "$KS" -storepass "$CM_KEYSTORE_PASSWORD"
            exit 1
          fi
      - name: Build AAB
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
    publishing:
      google_play:
        credentials: $PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
