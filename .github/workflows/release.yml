# Secrets (optional unless noted):
#   ANDROID_KEYSTORE_BASE64 — base64 of upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD — release signing
#   FIREBASE_TOKEN, FIREBASE_PROJECT_ID — deploy web after build (same job)
#
# Triggers: git tag v* (Android + Web), or workflow_dispatch (same + optional iOS if build_ios=true).

name: Release builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_ios:
        description: 'Build IPA (macOS; Apple Developer signing required)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  android-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Configure Android release signing (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret; release APK/AAB will use debug signing."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/android/upload-keystore.jks"
          cat > "$GITHUB_WORKSPACE/android/key.properties" << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK and App Bundle (release)
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  web-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build web --release

      - uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

      - name: Firebase Hosting deploy (optional)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          set -e
          if [ -z "$FIREBASE_TOKEN" ] || [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "Skipping Firebase deploy (set secrets FIREBASE_TOKEN and FIREBASE_PROJECT_ID)."
            exit 0
          fi
          npm install -g firebase-tools
          firebase deploy --only hosting --token "$FIREBASE_TOKEN" --project "$FIREBASE_PROJECT_ID"

  ios-release:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_ios == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: cd ios && pod install
      - name: Build IPA
        run: flutter build ipa --release

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
